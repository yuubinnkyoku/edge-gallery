name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: |
          for i in 1 2 3; do
            ./gradlew assembleRelease && break
            if [ "$i" -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "Build attempt $i failed. Retrying in 15 seconds..."
            sleep 15
          done
